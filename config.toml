[vectorfield.zero]
src = [0, 0]
dst = [5, 5]
xlim = [-1, 6]
ylim = [-1, 6]
travel_stw = 1

[vectorfield.circular]
src = [0.8660254037844386, 0.5] # [cos(pi/6), sin(pi/6)]
dst = [0, 1]
xlim = [-0.5, 1.0]
ylim = [0.0, 1.5]
travel_stw = 1

[vectorfield.doublegyre]
src = [1.5, 0.5]
dst = [0.5, 0.5]
xlim = [0, 2]
ylim = [0, 1]
travel_stw = 1
eps = 0

[vectorfield.fourvortices]
src = [0, 0]
dst = [6, 2]
xlim = [0, 6]
ylim = [-1, 6]
travel_stw = 1

[vectorfield.swirlys]
src = [0, 0]
dst = [6, 5]
xlim = [0, 6]
ylim = [-1, 6]
travel_time = 30

[vectorfield.techy]
src = [0.8660254037844386, 0.5] # [cos(pi/6), sin(pi/6)]
dst = [0, 1]
xlim = [-1, 1]
ylim = [-0.5, 1.5]
travel_stw = 1

[land]
water_level = [1.0, 0.9, 0.8, 0.7]
resolution = [3, 4, 5]
random_seed = [0, 1, 2, 3, 4, 5]
penalty = [10000000000]
penalty_init = [0]
penalty_increment = [1]
maxfevals = [5]
outbounds_is_land = [false]

[optimizer.cmaes]
popsize = [250, 500, 1000]
L = [151, 211, 301]
num_pieces = [1, 2, 3]
K = [7, 13, 19]
sigma0 = [1, 2, 3]
tolfun = [1e-6]
damping = [1.0]
maxfevals = [50000]

[refiner.fms]
patience = [50]
damping = [0.5]
maxfevals = [50000]

# Shell recipes capture reference parameters for helper shell scripts. They are
# kept here so the script settings live next to the Python config, but
# scripts/swopp3_run.py does not read this section.
[shell_recipes.activate_gpu]
source_script = "scripts/activate_gpu.sh"
description = "Shell environment defaults for GPU-first JAX sessions."
jax_platform_name = "cuda"
cuda_visible_devices = "0"
xla_python_client_preallocate = "false"

[shell_recipes.parameter_search]
source_script = "scripts/parameter_search.sh"
description = "Chunked parameter search launcher for scripts/parameter_search.py."
batch_size = 10
total_combinations = 81000
config_path = "config.toml"
results_dir = "output"

[shell_recipes.run_results]
source_script = "scripts/run_results.sh"
description = "Restart loop for the realworld results pipeline with faulthandler logging."
logfile = "/home/SHARED/routetools/run_results.log"
restart_delay_seconds = 10
commands = [
    "uv run python -X faulthandler scripts/realworld/results.py",
    "uv run python -X faulthandler scripts/realworld/figures.py",
    "uv run python -X faulthandler scripts/realworld/tables.py",
]

[swopp3.experiments.swopp3_0125_rust]
description = "Full 8-case SWOPP3 run on 0.125 degree ERA5 data in CPU mode."
source_script = "scripts/swopp3_slurm.sh"
output_dir = "output/swopp3_0125_rust"

[swopp3.experiments.swopp3_0125_rust.defaults]
wind_path_atlantic = "data/era5_0125/era5_wind_atlantic_2024.nc"
wave_path_atlantic = "data/era5_0125/era5_waves_atlantic_2024.nc"
wind_path_pacific = "data/era5_0125/era5_wind_pacific_2024.nc"
wave_path_pacific = "data/era5_0125/era5_waves_pacific_2024.nc"

[[swopp3.experiments.swopp3_0125_rust.runs]]
name = "full_run"

